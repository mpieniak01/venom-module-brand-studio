name: module-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Venom core
        uses: actions/checkout@v4
        with:
          repository: mpieniak01/Venom
          # Required for module_data_policy contract introduced in PR 184.
          # Keep this ref in sync with the core branch/merge target.
          ref: pr/184-optional-modules-contracts-gates
          path: venom-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pydantic-settings

      - name: Verify Venom core contract module
        run: |
          test -f venom-core/venom_core/core/module_data_policy.py

      - name: PR fast
        run: make pr-fast

      - name: New code coverage gate
        run: make check-new-code-coverage
